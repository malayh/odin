# Local dev infrastructure for Odin: Postgres (pgvector + Apache AGE) and MinIO (S3).
# The API server and worker run on the host via uv (see README).
services:
  postgres:
    build: ./docker/postgres
    environment:
      POSTGRES_USER: odin
      POSTGRES_PASSWORD: odin
      POSTGRES_DB: odin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odin"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    entrypoint: [""]
    command: ["sh", "-c", "mkdir -p /data/odin-data && minio server --console-address :9001 --quiet /data"]
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=supersecret
    volumes:
      - minio_data:/data
    networks:
      - localsetup
      - default
    ports:
      - 9000:9000
      - 9001:9001

volumes:
  pgdata:
  minio_data:
